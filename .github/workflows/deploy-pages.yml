name: Deploy ao GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configura o Pages (habilita se necessário)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Empacota o site estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Publica no Pages
        id: deployment
        uses: actions/deploy-pages@v4
